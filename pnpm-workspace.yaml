packages:
  - examples/*
  - examples/module/playground
  - stubs/*

ignoredBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - oxc-resolver
  - unrs-resolver
  - vue-demi

onlyBuiltDependencies:
  - better-sqlite3
  - '@tailwindcss/oxide'

overrides:
  '@cucumber/cucumber': 12.8.3
  '@nuxt/schema': 4.4.5
  '@nuxt/test-utils': workspace:*
  '@types/node': 24.12.2
  rollup: 4.60.3
  vite: 8.0.12
  vite-node: 6.0.0
  vitest: 4.1.5
  vue: ^3.5.34

patchedDependencies:
  node-mock-http: patches/node-mock-http.patch

shellEmulator: true

ignoreWorkspaceRootCheck: true
