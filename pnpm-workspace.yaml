packages:
  - examples/*
  - examples/module/playground
  - stubs/*

overrides:
  '@cucumber/cucumber': 12.9.0
  '@nuxt/schema': 4.4.6
  '@nuxt/test-utils': workspace:*
  '@types/node': 24.12.4
  rollup: 4.60.4
  vite: 8.0.13
  vite-node: 6.0.0
  vitest: 4.1.6
  vue: ^3.5.34

patchedDependencies:
  node-mock-http: patches/node-mock-http.patch

shellEmulator: true

ignoreWorkspaceRootCheck: true

allowBuilds:
  "@parcel/watcher": false
  "@tailwindcss/oxide": true
  better-sqlite3: true
  esbuild: false
  oxc-resolver: false
  unrs-resolver: false
  vue-demi: false
